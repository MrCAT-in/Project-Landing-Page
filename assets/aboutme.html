<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Roboto;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            background-image: url(cat_eyes_face.jpg);
            background-size: cover;
            background-attachment: fixed;
            background-repeat: no-repeat;
            justify-content: center;
            align-items: center;
        }

        a {text-decoration: none;
        color: rgb(255, 255, 255);
        background-color: blueviolet;
        padding: 0.75rem;
        border-radius: 0.5rem;
        font-weight: bold;
        display: inline-flex;
        align-items: center;
        flex-shrink: 0;}
        
        section{
            box-sizing: border-box;
            width: 100%;
            padding: 1rem;
        }

        .main{
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            width: 100%;
            max-width: 550px;
            min-height: 350px;
            background-color: rgba(242, 255, 228, 0.527);
            border-radius: 20pt;
            padding: 1rem;
            margin: 0 auto;
            overflow: hidden;
        }

        nav{
            display: flex;
            padding: 0 0.5rem;
        }
        
        .container{
            color: rgb(255, 255, 255);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 8vw, 3.5rem);
            text-align: center;
            font-weight: bold;
            text-shadow: 4px 3px 4px black;
            overflow-wrap: break-word;
            word-break:break-all;
        }

        h2{padding: 0;
        margin: 0;}



    </style>
</head>
<body>
    <section>
        <div class="main">
            <nav>
                <a href="../index.html">Return to home</a>
            </nav>

            <div class="container">
                <h2>loading...</h2>
            </div>
        </div>
    </section>
</body>
</html>
